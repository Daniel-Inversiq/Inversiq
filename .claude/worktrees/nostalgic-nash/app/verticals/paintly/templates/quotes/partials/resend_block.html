{% set q = quote_ui or {} %}
<div class="space-y-2.5">
  {% if q.can_send %}
    <form class="m-0 flex w-full"
          method="post"
          action="/app/leads/{{ lead.id }}/send">
      <button class="inline-flex min-h-[2.75rem] w-full items-center justify-center gap-2 rounded-xl bg-[linear-gradient(135deg,#38bdf8,#0284c7)] px-4 text-sm font-semibold text-white shadow-[0_10px_24px_rgba(14,165,233,0.22)] transition hover:brightness-95 disabled:opacity-60"
              type="submit">
        <span id="send-indicator-{{ lead.id }}" class="htmx-indicator inline-flex h-4 w-4 items-center justify-center">
          <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </span>
        {% if q.quote_status == 'sent' %}Opnieuw sturen naar klant{% else %}Stuur naar klant{% endif %}
      </button>
    </form>
  {% endif %}
</div>
