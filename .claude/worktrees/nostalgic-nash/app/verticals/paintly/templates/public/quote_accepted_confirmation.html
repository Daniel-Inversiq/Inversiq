<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offerte bevestigd - Paintly</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-10 sm:px-6">
    <div class="w-full rounded-3xl border border-slate-200 bg-white p-7 shadow-sm sm:p-10">
      <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Paintly</p>
      <div class="mt-5 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-100 text-emerald-700">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900">Uw akkoord is ontvangen</h1>
      <p class="mt-3 text-base leading-relaxed text-slate-600">
        Bedankt voor uw vertrouwen. We nemen binnenkort contact met u op om de planning af te stemmen.
      </p>
      <div class="mt-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-900">
        Deze offerte staat nu op geaccepteerd.
      </div>
      <div class="mt-8 flex flex-wrap gap-3">
        <a
          href="/e/{{ token }}"
          class="inline-flex items-center rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
        >
          Offerte bekijken
        </a>
      </div>
    </div>
  </div>
</body>
</html>
