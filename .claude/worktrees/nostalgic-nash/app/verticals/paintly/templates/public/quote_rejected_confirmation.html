<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reactie ontvangen - Paintly</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-10 sm:px-6">
    <div class="w-full rounded-3xl border border-slate-200 bg-white p-7 shadow-sm sm:p-10">
      <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Paintly</p>
      <div class="mt-5 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-200 text-slate-700">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M5 12a7 7 0 1114 0 7 7 0 01-14 0z"></path>
        </svg>
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900">Bedankt voor uw reactie</h1>
      <p class="mt-3 text-base leading-relaxed text-slate-600">
        U heeft aangegeven nu niet door te gaan. Als uw situatie verandert, helpen we u later graag verder.
      </p>
      <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700">
        Uw keuze is bevestigd en verwerkt.
      </div>
      <div class="mt-8">
        <a
          href="/e/{{ token }}"
          class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50"
        >
          Offerte bekijken
        </a>
      </div>
    </div>
  </div>
</body>
</html>
