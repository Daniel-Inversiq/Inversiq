{% if is_public is sameas true and can_customer_act is sameas true %}
<section class="w-full border-b border-slate-200 bg-white px-4 py-5 sm:px-8 sm:py-6" x-data="{ rejectOpen: false }">
    <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
      <div>
        <h2 class="text-lg font-semibold text-slate-900">Maak uw keuze</h2>
        <p class="mt-2 text-sm leading-relaxed text-slate-600">
          Door te accepteren geeft u akkoord op deze offerte. Afwijzen betekent dat u nu niet doorgaat.
        </p>
      </div>

      <div class="flex w-full flex-col gap-3 sm:w-auto sm:flex-row">
        <form
          class="m-0"
          hx-post="/e/{{ token }}/accept"
          hx-swap="none"
          hx-disabled-elt="button"
          hx-indicator="#accept-indicator"
        >
          <button
            type="submit"
            class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700 disabled:cursor-not-allowed disabled:opacity-60 sm:w-auto"
          >
            <span id="accept-indicator" class="htmx-indicator inline-flex h-4 w-4 items-center justify-center">
              <svg class="h-4 w-4 animate-spin text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </span>
            Offerte accepteren
          </button>
        </form>

        <button
          type="button"
          @click="rejectOpen = true"
          class="inline-flex w-full items-center justify-center rounded-xl border border-slate-300 bg-white px-5 py-3 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 sm:w-auto"
        >
          Offerte afwijzen
        </button>
      </div>
    </div>

  <div
    x-show="rejectOpen"
    x-cloak
    class="fixed inset-0 z-50 flex items-end justify-center p-4 sm:items-center"
    style="display:none;"
  >
    <div class="absolute inset-0 bg-slate-900/40" @click="rejectOpen = false"></div>
    <div class="relative w-full max-w-lg rounded-3xl border border-slate-200 bg-white p-6 shadow-xl" @click.stop>
      <div class="flex items-start justify-between gap-3">
        <div>
          <h3 class="text-base font-semibold text-slate-900">Offerte afwijzen</h3>
          <p class="mt-1 text-sm text-slate-600">U kunt optioneel een korte reden delen, zodat we u later beter kunnen helpen.</p>
        </div>
        <button
          type="button"
          @click="rejectOpen = false"
          class="rounded-lg p-1 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
          aria-label="Sluiten"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <form
        class="mt-5 space-y-4"
        hx-post="/e/{{ token }}/reject"
        hx-swap="none"
        hx-disabled-elt="button[type=submit]"
        hx-indicator="#reject-indicator"
      >
        <textarea
          name="reject_reason"
          rows="4"
          maxlength="1000"
          placeholder="Bijvoorbeeld: timing, budget of een andere keuze."
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-200"
        ></textarea>

        <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
          <button
            type="button"
            @click="rejectOpen = false"
            class="inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
          >
            Annuleren
          </button>
          <button
            type="submit"
            class="inline-flex items-center justify-center gap-2 rounded-xl bg-slate-800 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-900 disabled:cursor-not-allowed disabled:opacity-60"
          >
            <span id="reject-indicator" class="htmx-indicator inline-flex h-4 w-4 items-center justify-center">
              <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </span>
            Bevestig afwijzen
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
{% endif %}
