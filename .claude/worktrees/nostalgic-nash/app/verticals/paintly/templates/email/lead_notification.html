<!doctype html>
<html lang="nl">
<body style="margin:0;padding:0;background:#eef4fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
<tr>
<td align="center" style="padding:32px 16px;">

<table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;">

<!-- Header -->
<tr>
<td align="center" style="padding-bottom:24px;">
  <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:14px;background:#0ea5e9;color:#fff;margin-bottom:12px;">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
    </svg>
  </div>

  <div style="font-size:18px;font-weight:800;color:#0f172a;">
    Paintly
  </div>

  <div style="font-size:13px;color:#64748b;margin-top:4px;">
    Nieuwe lead ontvangen
  </div>
</td>
</tr>

<!-- Card -->
<tr>
<td style="background:#ffffff;border-radius:22px;padding:32px;border:1px solid #dbe4ee;box-shadow:0 1px 2px rgba(15,23,42,0.04);">

<span style="display:inline-block;background:#ecfdf5;color:#047857;font-size:12px;font-weight:700;padding:7px 12px;border-radius:999px;border:1px solid #a7f3d0;">
🎉 Nieuwe lead
</span>

<h1 style="margin:16px 0 18px;font-size:24px;font-weight:800;color:#0f172a;">
Er is een nieuwe offerteaanvraag binnengekomen
</h1>

<!-- Lead info -->
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:24px;font-size:14px;color:#334155;">

<p style="margin:0 0 8px;">
<strong>Naam:</strong> {{ lead_name }}
</p>

<p style="margin:0 0 8px;">
<strong>E-mailadres:</strong> {{ lead_email }}
</p>

<p style="margin:0;">
<strong>Lead ID:</strong> {{ lead_id }}
</p>

</div>

{% if admin_url %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
<tr>
<td align="center">

<a href="{{ admin_url }}"
   style="background:#0f172a;color:#ffffff;text-decoration:none;padding:14px 28px;font-weight:700;border-radius:12px;display:inline-block;">
  Open lead
</a>

</td>
</tr>
</table>
{% endif %}

</td>
</tr>

<!-- Footer -->
<tr>
<td style="text-align:center;padding-top:22px;font-size:12px;color:#64748b;line-height:1.7;">
Tenant: {{ tenant_name }}<br>
Verzonden via Paintly
</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
