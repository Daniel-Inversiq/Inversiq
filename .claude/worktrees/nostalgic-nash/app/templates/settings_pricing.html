<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prijsinstellingen — Paintly</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#eef4fb] text-slate-900 antialiased">

    <div class="mx-auto max-w-3xl px-4 py-10">

        <!-- Header -->
        <div class="mb-6 flex items-center gap-4">
            <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-sky-500 text-white shadow-sm">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-2.21 0-4 .895-4 2s1.79 2 4 2 4 .895 4 2-1.79 2-4 2m0-10v12m0-12c1.657 0 3 .672 3 1.5M12 8c-1.657 0-3 .672-3 1.5"/>
                </svg>
            </div>

            <div>
                <div class="text-sm text-slate-400">Instellingen</div>
                <h1 class="text-[28px] font-semibold tracking-tight text-slate-900">
                    Prijsinstellingen
                </h1>
                <p class="mt-1 text-sm text-slate-500">
                    Beheer de standaard prijslogica voor nieuwe Paintly offertes.
                </p>
            </div>
        </div>

        <!-- Card -->
        <div class="rounded-[28px] border border-slate-200/70 bg-white p-6 shadow-sm">

            {% if saved %}
            <div class="mb-5 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3">
                <div class="flex items-start gap-3">
                    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm font-semibold text-emerald-900">Opgeslagen</div>
                        <div class="mt-0.5 text-xs text-emerald-700">
                            De prijsinstellingen zijn bijgewerkt.
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}

            <form method="post" action="/settings/pricing" class="space-y-5">

                <div>
                    <label for="walls_rate_eur_per_sqm" class="mb-2 block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
                        Prijs per m² muren (€)
                    </label>

                    <input
                        id="walls_rate_eur_per_sqm"
                        name="walls_rate_eur_per_sqm"
                        type="number"
                        step="0.01"
                        min="5"
                        max="100"
                        required
                        value="{{ walls_rate_eur_per_sqm if walls_rate_eur_per_sqm is not none else '' }}"
                        class="h-11 w-full max-w-xs rounded-2xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
                    />

                    <p class="mt-2 text-sm text-slate-500">
                        Deze prijs wordt gebruikt voor nieuwe Paintly offertes voor muren.
                    </p>
                </div>

                <div class="pt-2">
                    <button
                        type="submit"
                        class="inline-flex h-11 items-center justify-center rounded-xl bg-sky-500 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-600"
                    >
                        Opslaan
                    </button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
