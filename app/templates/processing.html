<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI analyseert uw foto's - Paintly</title>

  <link rel="icon" href="https://offers.getpaintly.com/static/v1/favicon.ico">

  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(17, 24, 39, 0.92);
      --card-border: rgba(148, 163, 184, 0.25);
      --text: #e5e7eb;
      --muted: rgba(229, 231, 235, 0.72);
      --accent: #38bdf8;
      --danger: #f87171;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(1200px circle at 50% 0%, rgba(56, 189, 248, 0.12), transparent 55%), var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      padding: 28px;
    }

    .header {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 10px 0 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .loader-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    .hidden {
      display: none !important;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid rgba(56, 189, 248, 0.25);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .rules {
      margin-top: 18px;
      padding: 16px;
      background: rgba(2, 6, 23, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
    }

    .rules-label {
      font-size: 12px;
      color: rgba(229, 231, 235, 0.7);
      margin: 0 0 8px 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: rgba(229, 231, 235, 0.92);
      font-size: 14px;
      line-height: 1.6;
    }

    .error {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.10);
    }

    .error-title {
      font-weight: 650;
      margin: 0 0 6px 0;
      color: rgba(248, 113, 113, 0.95);
    }

    .error-text {
      white-space: pre-wrap;
      word-break: break-word;
      color: rgba(229, 231, 235, 0.88);
      font-size: 13px;
    }

    .error-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(2, 6, 23, 0.45);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      border-color: rgba(56, 189, 248, 0.55);
      background: rgba(56, 189, 248, 0.2);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      color: rgba(229, 231, 235, 0.6);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="card" role="status" aria-live="polite">
    <div class="header">
      <div>
        <h1 class="title" id="pageTitle">AI analyseert uw foto's...</h1>
        <p class="sub">Dit duurt meestal maar een paar seconden.</p>
      </div>
      <div class="loader-wrap" id="loaderWrap" aria-hidden="true">
        <div class="spinner"></div>
        <div style="color: var(--muted); font-size: 14px;">Even geduld...</div>
      </div>
    </div>

    <div class="rules" id="rulesBox">
      <p class="rules-label">Regels</p>
      <ul>
        <li>Oppervlak bepalen...</li>
        <li>Voorbereiding inschatten...</li>
        <li>Conceptofferte opstellen...</li>
      </ul>
    </div>

    <div class="error" id="errorBox">
      <div class="error-title">We konden je aanvraag niet verwerken</div>
      <div class="error-text" id="errorText"></div>
      <div class="error-actions">
        <button type="button" class="btn primary" id="retryBtn">Opnieuw proberen</button>
        <a href="/" class="btn" id="backBtn">Terug</a>
      </div>
    </div>

    <div class="footer">Paintly - AI-gestuurde offertes</div>
  </div>

  <script>
    const leadId = String({{ lead_id | tojson }});
    const statusEndpoint = String({{ (status_endpoint or ('/leads/' ~ lead_id ~ '/status')) | tojson }});
    const retryEndpoint = String({{ (retry_endpoint or ('/quotes/publish/' ~ lead_id)) | tojson }});
    const initKey = `processing_init_${leadId}`;

    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");
    const pageTitle = document.getElementById("pageTitle");
    const loaderWrap = document.getElementById("loaderWrap");
    const rulesBox = document.getElementById("rulesBox");
    const retryBtn = document.getElementById("retryBtn");
    const backBtn = document.getElementById("backBtn");

    function showFailed(msg, data) {
      if (pageTitle) pageTitle.textContent = "Er is iets misgegaan";
      if (loaderWrap) loaderWrap.classList.add("hidden");
      if (rulesBox) rulesBox.classList.add("hidden");
      if (errorBox) errorBox.style.display = "block";
      if (errorText) errorText.textContent = msg || "Er is iets misgegaan. Probeer het opnieuw.";
      if (backBtn && data && data.back_url) backBtn.setAttribute("href", String(data.back_url));
    }

    function showLoading() {
      if (pageTitle) pageTitle.textContent = "AI analyseert uw foto's...";
      if (loaderWrap) loaderWrap.classList.remove("hidden");
      if (rulesBox) rulesBox.classList.remove("hidden");
      if (errorBox) errorBox.style.display = "none";
    }

    function redirectToDone(data) {
      const url = (data && data.redirect_url) ? String(data.redirect_url) : "/thank-you";
      window.location.href = url;
    }

    async function fetchStatusOnce() {
      try {
        const res = await fetch(statusEndpoint, {
          method: "GET",
          headers: { "accept": "application/json" },
          cache: "no-store"
        });
        if (!res.ok) return null;
        return await res.json();
      } catch (_) {
        return null;
      }
    }

    let pollIntervalId = null;
    let isStopping = false;

    function stopPolling() {
      if (pollIntervalId) {
        clearInterval(pollIntervalId);
        pollIntervalId = null;
      }
    }

    async function pollOnceAndAct() {
      const data = await fetchStatusOnce();
      if (!data || isStopping) return;

      const status = (data.status || "queued").toString();
      if (status === "done") {
        isStopping = true;
        stopPolling();
        redirectToDone(data);
        return;
      }

      if (status === "failed") {
        isStopping = true;
        stopPolling();
        showFailed(data.user_message || "Er is iets misgegaan. Probeer het opnieuw.", data);
      }
    }

    async function retryQuote() {
      if (retryBtn) retryBtn.disabled = true;
      showLoading();
      isStopping = false;

      try {
        await fetch(retryEndpoint, {
          method: "POST",
          cache: "no-store"
        });
      } catch (_) {
        showFailed("Opnieuw proberen is nu niet gelukt. Probeer het zo nog eens.", null);
      } finally {
        if (!pollIntervalId) {
          pollIntervalId = setInterval(pollOnceAndAct, 2000);
        }
        pollOnceAndAct();
        if (retryBtn) retryBtn.disabled = false;
      }
    }

    if (retryBtn) retryBtn.addEventListener("click", retryQuote);

    if (!window[initKey]) {
      window[initKey] = true;
      pollIntervalId = setInterval(pollOnceAndAct, 2000);
      pollOnceAndAct();
    }
  </script>
</body>
</html>
