<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offerte wordt gemaakt - Inversiq</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #111318;
      -webkit-font-smoothing: antialiased;
    }

    .block {
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    /* Spinner */
    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #e5e7eb;
      border-top-color: #6b7280;
      animation: spin 0.85s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none !important; }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 500;
      color: #111318;
      line-height: 1.35;
    }

    .sub {
      margin: 6px 0 0;
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .step-line {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      min-height: 20px;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-line.animate {
      animation: fadein 0.3s ease both;
    }

    /* Error state */
    .error {
      display: none;
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      text-align: left;
    }

    .error-title {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
      color: #92400e;
    }

    .error-text {
      font-size: 12px;
      color: #78350f;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .error-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      appearance: none;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
      border-radius: 4px;
      padding: 0 12px;
      height: 30px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.1s;
    }

    .btn:hover { background: #f9fafb; }

    .btn.primary {
      border-color: #111318;
      background: #111318;
      color: #fff;
    }

    .btn.primary:hover { background: #1e2129; }
  </style>
</head>
<body>
  <div class="block" role="status" aria-live="polite">
    <div class="spinner" id="spinner"></div>

    <h1 class="title" id="pageTitle">Offerte wordt gemaakt...</h1>
    <p class="sub">Dit duurt meestal een paar seconden.</p>

    <div class="step-line" id="stepLine">Foto's analyseren...</div>

    <div class="error" id="errorBox">
      <div class="error-title">We konden je aanvraag niet verwerken</div>
      <div class="error-text" id="errorText"></div>
      <div class="error-actions">
        <button type="button" class="btn primary" id="retryBtn">Opnieuw proberen</button>
        <a href="/" class="btn" id="backBtn">Terug</a>
      </div>
    </div>
  </div>

  <script>
    const leadId = String({{ lead_id | tojson }});
    const statusEndpoint = String({{ (status_endpoint or ('/leads/' ~ lead_id ~ '/status')) | tojson }});
    const retryEndpoint = String({{ (retry_endpoint or ('/quotes/publish/' ~ lead_id)) | tojson }});
    const initKey = `processing_init_${leadId}`;
    const stuckDeadlineMs = Date.now() + 12 * 60 * 1000;

    const errorBox  = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");
    const pageTitle = document.getElementById("pageTitle");
    const stepLine  = document.getElementById("stepLine");
    const retryBtn  = document.getElementById("retryBtn");
    const backBtn   = document.getElementById("backBtn");
    const spinner   = document.getElementById("spinner");

    // ── Step rotation ──────────────────────────────────────────────
    const loadingSteps = [
      "Aanvraag wordt verwerkt...",
      "Gegevens worden gecontroleerd...",
      "Offerte wordt gemaakt...",
    ];
    let stepIdx = 0;
    let stepTimerId = null;

    function setStep(text) {
      if (!stepLine) return;
      stepLine.classList.remove("animate");
      // Force reflow so animation restarts
      void stepLine.offsetWidth;
      stepLine.textContent = text;
      stepLine.classList.add("animate");
    }

    function startStepRotation() {
      stepIdx = 0;
      setStep(loadingSteps[0]);
      stepTimerId = setInterval(function () {
        stepIdx = (stepIdx + 1) % loadingSteps.length;
        setStep(loadingSteps[stepIdx]);
      }, 2200);
    }

    function stopStepRotation() {
      if (stepTimerId) { clearInterval(stepTimerId); stepTimerId = null; }
    }

    // ── State helpers ──────────────────────────────────────────────
    function showReviewPending(msg) {
      stopStepRotation();
      if (pageTitle) pageTitle.textContent = "Uw aanvraag wordt gecontroleerd";
      if (spinner)   spinner.classList.add("hidden");
      if (stepLine)  { setStep(msg || "Er is handmatige controle nodig."); }
      if (errorBox)  errorBox.style.display = "none";
    }

    function showFailed(msg, data) {
      stopStepRotation();
      if (pageTitle) pageTitle.textContent = "Er is iets misgegaan";
      if (spinner)   spinner.classList.add("hidden");
      if (stepLine)  stepLine.textContent = "";
      if (errorBox)  errorBox.style.display = "block";
      if (errorText) errorText.textContent = msg || "Er is iets misgegaan. Probeer het opnieuw.";
      if (backBtn && data && data.back_url) backBtn.setAttribute("href", String(data.back_url));
    }

    function showLoading() {
      if (pageTitle) pageTitle.textContent = "Offerte wordt gemaakt...";
      if (spinner)   spinner.classList.remove("hidden");
      if (errorBox)  errorBox.style.display = "none";
      startStepRotation();
    }

    function redirectToDone(data) {
      const url = (data && data.redirect_url) ? String(data.redirect_url) : "/thank-you";
      window.location.href = url;
    }

    // ── Polling ────────────────────────────────────────────────────
    async function fetchStatusOnce() {
      try {
        const res = await fetch(statusEndpoint, {
          method: "GET",
          headers: { "accept": "application/json" },
          cache: "no-store"
        });
        if (!res.ok) return null;
        return await res.json();
      } catch (_) {
        return null;
      }
    }

    let pollIntervalId = null;
    let isStopping = false;

    function stopPolling() {
      if (pollIntervalId) { clearInterval(pollIntervalId); pollIntervalId = null; }
    }

    async function pollOnceAndAct() {
      if (!isStopping && Date.now() > stuckDeadlineMs) {
        isStopping = true;
        stopPolling();
        showFailed(
          "Dit duurt langer dan verwacht. Controleer je verbinding of probeer het later opnieuw. "
          + "Als het probleem aanhoudt, neem contact op met de schilder.",
          { back_url: "/" }
        );
        return;
      }

      const data = await fetchStatusOnce();
      if (!data || isStopping) return;

      const status = (data.status || "queued").toString();

      if (status === "done") {
        isStopping = true;
        stopPolling();
        redirectToDone(data);
        return;
      }

      if (status === "review_pending") {
        isStopping = true;
        stopPolling();
        showReviewPending(data.user_message);
        return;
      }

      if (status === "failed") {
        isStopping = true;
        stopPolling();
        showFailed(data.user_message || "Er is iets misgegaan. Probeer het opnieuw.", data);
      }
    }

    async function retryQuote() {
      if (retryBtn) retryBtn.disabled = true;
      showLoading();
      isStopping = false;

      try {
        await fetch(retryEndpoint, { method: "POST", cache: "no-store" });
      } catch (_) {
        showFailed("Opnieuw proberen is nu niet gelukt. Probeer het zo nog eens.", null);
      } finally {
        if (!pollIntervalId) { pollIntervalId = setInterval(pollOnceAndAct, 2000); }
        pollOnceAndAct();
        if (retryBtn) retryBtn.disabled = false;
      }
    }

    if (retryBtn) retryBtn.addEventListener("click", retryQuote);

    if (!window[initKey]) {
      window[initKey] = true;
      showLoading();
      pollIntervalId = setInterval(pollOnceAndAct, 2000);
      pollOnceAndAct();
    }
  </script>
</body>
</html>
