<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zonnepanelen offerte — Inversiq</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">

<div class="flex min-h-screen items-start justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="mb-8 text-center">
      <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 text-white shadow-sm">
        <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m14.95 5.66-.71-.71M6.41 6.41l-.71-.71m12.02 0-.71.71M6.41 17.59l-.71.71M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z"/>
        </svg>
      </div>
      <p class="text-[11px] font-semibold uppercase tracking-[0.16em] text-orange-500">Inversiq — Zonne-energie</p>
      <h1 class="mt-2 text-2xl font-semibold tracking-[-0.02em] text-slate-900">Zonnepanelen offerte</h1>
      <p class="mt-1.5 text-sm text-slate-500">Vul de gegevens in voor een directe prijsindicatie.</p>
    </div>

    <!-- Card -->
    <div class="overflow-hidden rounded-[28px] border border-slate-200/60 bg-white shadow-sm">
      <form method="post" action="/intake/solar" class="px-8 py-8 space-y-5">

        <!-- hidden fields -->
        <input type="hidden" name="lead_id" value="{{ lead_id }}" />
        <input type="hidden" name="tenant_id" value="{{ tenant_id }}" />
        <input type="hidden" name="vertical" value="solar" />

        <!-- Contact -->
        <div class="space-y-4">
          <div class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-400">Uw gegevens</div>

          <div>
            <label for="name" class="mb-1.5 block text-sm font-medium text-slate-700">Naam</label>
            <input id="name" name="name" type="text" required placeholder="Jan de Vries"
              class="h-11 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100" />
          </div>

          <div>
            <label for="email" class="mb-1.5 block text-sm font-medium text-slate-700">E-mailadres</label>
            <input id="email" name="email" type="email" required placeholder="jan@voorbeeld.nl"
              class="h-11 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100" />
          </div>

          <div>
            <label for="phone" class="mb-1.5 block text-sm font-medium text-slate-700">
              Telefoonnummer <span class="text-slate-400 font-normal">(optioneel)</span>
            </label>
            <input id="phone" name="phone" type="tel" placeholder="06 12345678"
              class="h-11 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100" />
          </div>
        </div>

        <div class="border-t border-slate-100"></div>

        <!-- Solar details -->
        <div class="space-y-4">
          <div class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-400">Systeemgegevens</div>

          <div>
            <label for="system_kw" class="mb-1.5 block text-sm font-medium text-slate-700">Gewenst vermogen (kWp)</label>
            <input id="system_kw" name="system_kw" type="number" step="0.1" min="1" max="100"
              placeholder="bijv. 6.5"
              class="h-11 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100" />
            <p class="mt-1.5 text-xs text-slate-400">Laat leeg als u het niet weet — we gebruiken dan een standaardschatting.</p>
          </div>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button type="submit"
            class="flex h-11 w-full items-center justify-center rounded-2xl bg-gradient-to-r from-amber-400 to-orange-500 text-sm font-semibold text-white shadow-sm transition hover:from-amber-500 hover:to-orange-600">
            Offerte berekenen
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

</body>
</html>
