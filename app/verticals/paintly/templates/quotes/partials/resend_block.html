{% set q = quote_ui or {} %}
<div class="space-y-2.5">
  {% if q.can_send %}
    <form class="m-0 flex w-full"
          hx-post="/app/leads/{{ lead.id }}/send"
          hx-target="body"
          hx-swap="none"
          hx-disabled-elt="button[type=submit]"
          hx-indicator="#send-indicator-{{ lead.id }}">
      <button class="inline-flex min-h-[2.75rem] w-full items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 disabled:opacity-60"
              type="submit">
        <span id="send-indicator-{{ lead.id }}" class="htmx-indicator inline-flex h-4 w-4 items-center justify-center">
          <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </span>
        {% if q.quote_status == 'sent' %}Opnieuw sturen naar klant{% else %}Stuur naar klant{% endif %}
      </button>
    </form>
  {% endif %}

  <div class="border-t border-slate-100 pt-2.5">
    <p class="mb-2 text-[11px] font-medium text-slate-500">Overige acties</p>
  <div class="grid gap-2 sm:grid-cols-2">
    {% if q.can_generate %}
      <form method="post" action="/quotes/publish/{{ lead.id }}" class="m-0">
        <button class="inline-flex h-10 w-full items-center justify-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 hover:text-slate-900 disabled:opacity-60" type="submit">
          Offerte opstellen
        </button>
      </form>
    {% endif %}
    {% if q.can_view %}
      <a class="inline-flex h-10 w-full items-center justify-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 hover:text-slate-900" href="/app/leads/{{ lead.id }}/estimate" target="_blank">
        Bekijk offerte
      </a>
    {% endif %}
    {% if q.can_regenerate %}
      <form method="post" action="/app/reviews/{{ lead.id }}/generate-estimate" class="m-0 sm:col-span-2">
        <button class="inline-flex h-10 w-full items-center justify-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-50 hover:text-slate-900 disabled:opacity-60" type="submit">
          Offerte opnieuw berekenen
        </button>
      </form>
    {% endif %}
  </div>
  </div>
</div>
