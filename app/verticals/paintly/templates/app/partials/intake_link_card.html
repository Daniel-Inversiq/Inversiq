{% if intake_url %}
  <style>
    .intake-link-copy-btn.intake-copy-success {
      background-color: rgb(5 150 105);
    }
    .intake-link-copy-btn.intake-copy-success:hover {
      background-color: rgb(4 120 87);
    }
  </style>
  <section
    class="rounded-xl border border-sky-200/70 bg-sky-50/90 px-4 py-3 shadow-sm ring-1 ring-sky-100/50"
    aria-labelledby="intake-link-heading"
  >
    <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between lg:gap-4">
      <div class="min-w-0 flex-1">
        <h2 id="intake-link-heading" class="text-base font-semibold tracking-tight text-slate-900">
          Jouw intake-link
        </h2>
        <p class="mt-0.5 text-sm text-slate-600">
          Stuur deze link naar je klant of zet hem op je website.
        </p>
        <div class="mt-2 rounded-lg border border-slate-200/80 bg-slate-50/50 px-3 py-1.5">
          <p class="break-all text-sm font-medium text-slate-900 select-all">{{ intake_url }}</p>
        </div>
      </div>
      <div class="flex flex-shrink-0 flex-wrap items-center gap-2 lg:max-w-none">
        <button
          type="button"
          class="intake-link-copy-btn inline-flex h-9 items-center justify-center rounded-lg bg-slate-900 px-3.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
          data-intake-url="{{ intake_url|e }}"
          data-copy-label="Kopieer link"
          data-intake-copy-btn
          aria-live="polite"
        >
          Kopieer link
        </button>
        <a
          href="{{ intake_url }}"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex h-9 items-center justify-center rounded-lg bg-sky-600 px-3.5 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-700"
        >
          Open link
        </a>
        {% set wa_intake_message = "Hallo, via deze link kun je jouw schilderaanvraag invullen: " ~ intake_url %}
        <a
          href="https://wa.me/?text={{ wa_intake_message|url_query_quote }}"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex h-9 items-center justify-center rounded-lg border border-emerald-300 bg-emerald-50 px-3.5 text-sm font-semibold text-emerald-900 shadow-sm transition hover:bg-emerald-100"
        >
          Deel via WhatsApp
        </a>
      </div>
    </div>
  </section>
  <script>
    (function () {
      document.querySelectorAll("[data-intake-copy-btn]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var url = btn.getAttribute("data-intake-url");
          if (!url) return;
          var label = btn.getAttribute("data-copy-label") || "Kopieer link";
          navigator.clipboard.writeText(url).then(function () {
            btn.textContent = "Gekopieerd!";
            btn.classList.add("intake-copy-success");
            setTimeout(function () {
              btn.textContent = label;
              btn.classList.remove("intake-copy-success");
            }, 2000);
          }).catch(function () {});
        });
      });
    })();
  </script>
{% endif %}
