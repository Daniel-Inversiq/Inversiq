{% if intake_url %}
  <style>
    .intake-link-copy-btn.intake-copy-success {
      background-color: rgb(14 165 233);
      box-shadow: 0 6px 16px rgba(14, 165, 233, 0.15);
    }
    .intake-link-copy-btn.intake-copy-success:hover {
      background-color: rgb(2 132 199);
    }
  </style>

  <section
    class="overflow-hidden rounded-[22px] border border-slate-200/70 bg-white px-5 py-4 shadow-sm"
    aria-labelledby="intake-link-heading"
  >
    <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between lg:gap-4">
      <div class="min-w-0 flex-1">
        <div class="inline-flex items-center rounded-full border border-slate-200 bg-white px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-600">
          Intake
        </div>

        <div class="mt-2.5 flex items-start gap-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-sky-50 text-sky-600">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 010 5.656l-1.414 1.414a4 4 0 01-5.657-5.657l1.414-1.414M10.172 13.828a4 4 0 010-5.656l1.414-1.414a4 4 0 115.657 5.657l-1.414 1.414" />
            </svg>
          </div>

          <div class="min-w-0 flex-1">
            <h2 id="intake-link-heading" class="text-lg font-semibold tracking-tight text-slate-900">
              Jouw intake-link
            </h2>
            <p class="mt-1 text-sm leading-6 text-slate-500">
              Stuur deze link naar je klant of zet hem op je website.
            </p>
          </div>
        </div>

        <div class="mt-3.5 rounded-2xl border border-slate-200 bg-white px-4 py-3">
          <p class="break-all select-all font-mono text-[13px] font-medium text-slate-800">{{ intake_url }}</p>
        </div>
      </div>

      <div class="flex flex-shrink-0 flex-wrap items-center gap-2 lg:max-w-none lg:justify-end">
        <button
          type="button"
          class="intake-link-copy-btn inline-flex h-9 items-center justify-center rounded-xl bg-gradient-to-r from-sky-500 to-blue-500 px-3.5 text-xs font-semibold text-white shadow-sm transition hover:from-sky-600 hover:to-blue-600"
          data-intake-url="{{ intake_url|e }}"
          data-copy-label="Kopieer link"
          data-intake-copy-btn
          aria-live="polite"
        >
          Kopieer link
        </button>

        <a
          href="{{ intake_url }}"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex h-9 items-center justify-center rounded-xl border border-slate-200 bg-white px-3.5 text-xs font-semibold text-slate-700 transition hover:bg-slate-50"
        >
          Open link
        </a>

        {% set wa_intake_message = "Hallo, via deze link kun je jouw schilderaanvraag invullen: " ~ intake_url %}
        <a
          href="https://wa.me/?text={{ wa_intake_message|url_query_quote }}"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex h-9 items-center justify-center rounded-xl border border-emerald-200 bg-emerald-50 px-3.5 text-xs font-semibold text-emerald-800 transition hover:bg-emerald-100"
        >
          Deel via WhatsApp
        </a>
      </div>
    </div>
  </section>

  <script>
    (function () {
      document.querySelectorAll("[data-intake-copy-btn]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var url = btn.getAttribute("data-intake-url");
          if (!url) return;
          var label = btn.getAttribute("data-copy-label") || "Kopieer link";
          navigator.clipboard.writeText(url).then(function () {
            btn.textContent = "Gekopieerd!";
            btn.classList.add("intake-copy-success");
            setTimeout(function () {
              btn.textContent = label;
              btn.classList.remove("intake-copy-success");
            }, 2000);
          }).catch(function () {});
        });
      });
    })();
  </script>
{% endif %}
