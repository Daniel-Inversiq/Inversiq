<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    {% if title %}
      {{ title }} — {{ company_name or "Inversiq" }}
    {% else %}
      Offerte bewerken — {{ company_name or "Inversiq" }}
    {% endif %}
  </title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Segoe UI', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 2px rgba(15,23,42,0.04), 0 6px 14px -10px rgba(15,23,42,0.16)',
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --iq-brand-green: #65a30d;
      --iq-brand-green-strong: #4d7c0f;
      --iq-brand-green-soft: #ecfccb;
      --iq-brand-green-bg: #f7fee7;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .ui-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }
    .quote-top-shell {
      border-top: 2px solid color-mix(in srgb, var(--iq-brand-green) 50%, white);
    }
    .quote-secondary-btn {
      border-color: #d1d5db;
      color: #334155;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .quote-secondary-btn:hover {
      border-color: color-mix(in srgb, var(--iq-brand-green) 35%, white);
      background: color-mix(in srgb, var(--iq-brand-green-bg) 90%, white);
      color: var(--iq-brand-green-strong);
    }
    .quote-edit-surface input:focus,
    .quote-edit-surface textarea:focus,
    .quote-edit-surface select:focus {
      border-color: color-mix(in srgb, var(--iq-brand-green) 85%, white) !important;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--iq-brand-green) 18%, transparent) !important;
      outline: none !important;
    }
    .iq-accent-dot { color: var(--iq-brand-green); }
    .iq-pill {
      border: 1px solid color-mix(in srgb, var(--iq-brand-green) 30%, white);
      background: color-mix(in srgb, var(--iq-brand-green-bg) 95%, white);
      color: var(--iq-brand-green);
    }
    .iq-primary-btn {
      border-color: var(--iq-brand-green-strong);
      background: var(--iq-brand-green);
    }
    .iq-primary-btn:hover { background: var(--iq-brand-green-strong); }
    .iq-primary-btn:active { background: color-mix(in srgb, var(--iq-brand-green-strong) 92%, black); }
    .iq-summary-head {
      border-bottom-color: color-mix(in srgb, var(--iq-brand-green) 18%, white);
      background: color-mix(in srgb, var(--iq-brand-green-bg) 80%, white);
    }
    .iq-total-wrap {
      border-color: color-mix(in srgb, var(--iq-brand-green) 28%, white);
      background: color-mix(in srgb, var(--iq-brand-green-bg) 78%, white);
    }
    .iq-total-text { color: var(--iq-brand-green); }
  </style>
</head>
<body class="quote-edit-surface min-h-screen bg-slate-100 text-slate-900">
  <div class="quote-top-shell border-b border-slate-200/90 bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-[1400px] items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="/app/quotes" class="inline-flex items-center gap-2 text-[13px] font-semibold tracking-[-0.01em] text-slate-900">
        <span class="iq-pill inline-flex h-7 w-7 items-center justify-center rounded-lg text-[12px] font-semibold">IQ</span>
        {{ company_name or "Inversiq" }}
      </a>
      <a href="/offertes/{{ lead.id }}" class="quote-secondary-btn inline-flex h-9 items-center justify-center rounded-lg border bg-white px-3.5 text-[12px] font-semibold">
        Terug naar offerte
      </a>
    </div>
  </div>

  <main class="mx-auto w-full max-w-[1400px] px-4 py-6 sm:px-6 lg:px-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
