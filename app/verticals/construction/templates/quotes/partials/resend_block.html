{% set q = quote_ui or {} %}
<div class="space-y-2">
  {% if q.can_send %}
    <form class="m-0 flex w-full"
          method="post"
          action="/app/leads/{{ lead.id }}/send">
      <button class="inline-flex h-8 w-full items-center justify-center gap-2 rounded bg-[#111318] px-4 text-[11px] font-semibold text-white transition hover:bg-[#1e2129] disabled:opacity-50"
              type="submit">
        <span id="send-indicator-{{ lead.id }}" class="htmx-indicator inline-flex h-3.5 w-3.5 items-center justify-center">
          <svg class="h-3.5 w-3.5 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </span>
        {% if q.quote_status == 'sent' %}Opnieuw sturen naar klant{% else %}Stuur naar klant{% endif %}
      </button>
    </form>
  {% endif %}
</div>
